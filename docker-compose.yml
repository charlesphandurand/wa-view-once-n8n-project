version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_password
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n_password
      N8N_PROTOCOL: http
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_WEBHOOK_TUNNEL_URL: http://localhost:5678/
      N8N_METRICS: "true"
      N8N_LOG_LEVEL: info
      EXECUTIONS_DATA_PRUNE_TIMEOUT: 3600
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/n8n/workflows
    networks:
      - n8n-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  whatsapp-api:
    build:
      context: ./whatsapp-api
      dockerfile: Dockerfile
    container_name: whatsapp-api
    restart: unless-stopped
    environment:
      PORT: 3000
      API_KEY: your_super_secret_api_key_change_me_123456
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/whatsapp-webhook
      LOG_LEVEL: info
      NODE_OPTIONS: --dns-result-order=ipv4first
    ports:
      - "3000:3000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - whatsapp_auth:/app/.auth
      - whatsapp_data:/app/data
    networks:
      - n8n-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  n8n_data:
  whatsapp_auth:
  whatsapp_data:

networks:
  n8n-network:
    driver: bridge
